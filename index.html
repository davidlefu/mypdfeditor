<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF Editor with Text Boxes</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 0; }
  #toolbar { padding: 10px; background: #eee; display: flex; gap: 10px; }
  #pdf-container { position: relative; display: inline-block; }
  #pdf-canvas { border: 1px solid #ccc; }
  .text-box {
    position: absolute;
    border: 1px dashed #000;
    background: rgba(255,255,255,0.8);
    resize: none;
    font: 16px Arial;
    overflow: hidden;
  }
  .font-size-picker {
    position: absolute;
    top: -24px;
    left: 0;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <input type="file" id="file-input" accept="application/pdf">
  <button id="add-textbox">Add Text Box</button>
  <button id="save-pdf">Save PDF</button>
</div>

<div id="pdf-container">
  <canvas id="pdf-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
const fileInput = document.getElementById('file-input');
const addTextboxBtn = document.getElementById('add-textbox');
const savePdfBtn = document.getElementById('save-pdf');
const pdfContainer = document.getElementById('pdf-container');
const pdfCanvas = document.getElementById('pdf-canvas');
const ctx = pdfCanvas.getContext('2d');

let pdfDoc = null;
let currentPage = null;
let scale = 1.5;
let addingTextbox = false;
let textboxes = []; // store {x, y, w, h, text, fontSize}

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

// Load PDF into canvas
async function loadPDF(arrayBuffer) {
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  renderPage(1);
}

async function renderPage(num) {
  currentPage = await pdfDoc.getPage(num);
  const viewport = currentPage.getViewport({ scale });
  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;
  
  await currentPage.render({ canvasContext: ctx, viewport }).promise;
}

// File input handler
fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => loadPDF(ev.target.result);
    reader.readAsArrayBuffer(file);
  }
});

addTextboxBtn.addEventListener('click', () => {
  addingTextbox = true;
});

pdfContainer.addEventListener('mousedown', (e) => {
  if (!addingTextbox) return;
  
  const startX = e.offsetX;
  const startY = e.offsetY;
  
  const textarea = document.createElement('textarea');
  textarea.className = 'text-box';
  textarea.style.left = startX + 'px';
  textarea.style.top = startY + 'px';

  // Font size selector
  const fontSizeSelect = document.createElement('select');
  fontSizeSelect.className = 'font-size-picker';
  [8, 10, 12, 14, 16, 18, 20, 24, 28, 32].forEach(size => {
    const option = document.createElement('option');
    option.value = size;
    option.textContent = size + 'px';
    if (size === 16) option.selected = true;
    fontSizeSelect.appendChild(option);
  });
  textarea.fontSizeSelect = fontSizeSelect; // attach reference

  pdfContainer.appendChild(textarea);
  pdfContainer.appendChild(fontSizeSelect);

  function updateFontSize() {
    textarea.style.fontSize = fontSizeSelect.value + 'px';
  }
  fontSizeSelect.addEventListener('change', updateFontSize);
  updateFontSize();

  function positionFontPicker() {
    fontSizeSelect.style.left = textarea.style.left;
    fontSizeSelect.style.top = (parseInt(textarea.style.top) - 24) + 'px';
  }
  positionFontPicker();

  function onMouseMove(ev) {
    const w = ev.offsetX - startX;
    const h = ev.offsetY - startY;
    textarea.style.width = Math.abs(w) + 'px';
    textarea.style.height = Math.abs(h) + 'px';
    textarea.style.left = (w < 0 ? ev.offsetX : startX) + 'px';
    textarea.style.top = (h < 0 ? ev.offsetY : startY) + 'px';
    positionFontPicker();
  }
  
  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    textarea.focus();
    addingTextbox = false;
    
    textarea.addEventListener('blur', () => {
      const fontSize = parseInt(fontSizeSelect.value);
      textboxes.push({
        x: parseInt(textarea.style.left),
        y: parseInt(textarea.style.top),
        w: textarea.offsetWidth,
        h: textarea.offsetHeight,
        text: textarea.value,
        fontSize
      });
      // make it uneditable
      const div = document.createElement('div');
      div.className = 'text-box';
      div.style.left = textarea.style.left;
      div.style.top = textarea.style.top;
      div.style.width = textarea.style.width;
      div.style.height = textarea.style.height;
      div.style.border = 'none';
      div.style.pointerEvents = 'none';
      div.style.whiteSpace = 'pre-wrap';
      div.style.padding = '2px';
      div.style.fontSize = fontSize + 'px';
      div.textContent = textarea.value;
      pdfContainer.removeChild(textarea);
      pdfContainer.removeChild(fontSizeSelect);
      pdfContainer.appendChild(div);
    });
  }
  
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
});

savePdfBtn.addEventListener('click', async () => {
  if (!pdfDoc || !currentPage) return;

  const pdfBytes = await pdfDoc.getData();
  const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);

  const helveticaFont = await pdfLibDoc.embedFont(PDFLib.StandardFonts.Helvetica);
  const page = pdfLibDoc.getPage(0);
  const viewport = currentPage.getViewport({ scale });

  textboxes.forEach(tb => {
    const pdfX = tb.x / scale;
    const pdfY = (viewport.height - (tb.y + tb.h)) / scale + tb.fontSize * 0.25;

    page.drawText(tb.text, {
      x: pdfX,
      y: pdfY,
      size: tb.fontSize,
      font: helveticaFont,
      color: PDFLib.rgb(0, 0, 0)
    });
  });

  const newPdfBytes = await pdfLibDoc.save();
  const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'edited.pdf';
  link.click();
});
</script>
</body>
</html>
